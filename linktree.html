<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Competition PEM 2026 – AIChE ITS SC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            background-color: #c0aeb0;
        }

        #card-linktree {
            background-color: #f5e1e4;
            min-height: 100vh;
            max-width: 550px;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            #card-linktree {
                border-radius: 0;
            }
        }

        .profile-logo {
            width: 96px;
            height: 96px;
            background-color: #ffffff;

        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .icon {
            width: 40px;
            height: 40px;
            background-color: rgb(245, 245, 245);
            margin: 10px;
        }

        .icon:hover {
            background-color: white;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: #333;
            font-size: 1.5rem;
        }

        .btn {
            background-color: #ffffff;
        }

        .btn:hover {
            background-color: #e0e0e0;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 10px;
        }

        .footer-links a {
            color: #000000;
        }

    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div class="container d-flex flex-column min-vh-100 mx-auto mt-0 mt-md-5 shadow " id="card-linktree">

            </div>
            <div class="d-flex gap-1">

        </div>

        <div class="content text-center flex-grow-1 d-flex flex-column">

            <div>
                <img src="assets/img/logo-linktree.webp"
                    class="profile-logo rounded-circle justify-content-center align-items-center mx-auto" alt="Logo">
            </div>

            <div class="profile-title">COMPETITION PEM 2026</div>
            <div class="profile-title2">AIChE ITS SC</div>

            <div class="social-icons">

                <a href="#" title="TikTok" class="mt-3"><i class="fab fa-tiktok"></i></a>
            </div>

            <div class="d-flex flex-column mt-3">

                    <span class="">⋮</span>

                <a href="https://linktr.ee/PECPEMITS26" class="btn d-flex justify-content-between rounded-pill mb-3 shadow p-3">
                    <span class="mx-auto">Professional Engineering Competition (PEC)</span>
                    <span class="">⋮</span>
                </a>

            </div>

            <div class="footer-links mt-auto mb-5">
                <a href="#">Cookie Preferences</a> &middot;
                <a href="#">Report</a> &middot;
                <a href="#">Privacy</a> &middot;
                <a href="#">Explore</a>

        </div>
        <script>
            feather.replace();
